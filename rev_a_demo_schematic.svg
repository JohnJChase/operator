<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">WE302 Operator Rev A demo schematic</title>
  <desc id="desc">A video-friendly schematic showing Raspberry Pi GPIO and USB audio connected through the Rev A interface board to a Western Electric 302 telephone.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#27313d" stroke-width="1" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-audio" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#58d68d"/>
    </marker>
    <marker id="arrow-side" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#c891ff"/>
    </marker>
    <style>
      .bg { fill: #111821; }
      .panel { fill: #182231; stroke: #435166; stroke-width: 2; }
      .panel-soft { fill: #1d2a3a; stroke: #4a5a70; stroke-width: 2; }
      .title { fill: #f4f0e8; font: 500 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { fill: #aeb8c6; font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { fill: #f4f0e8; font: 500 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #e9edf2; font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #b7c1ce; font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #9fabb9; font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .term { fill: #111821; stroke: #64748b; stroke-width: 1.5; }
      .chip { fill: #233246; stroke: #5f7188; stroke-width: 1.5; }
      .part { fill: #101720; stroke: #8aa0b8; stroke-width: 1.5; }
      .audio-zone { fill: #143026; stroke: #58d68d; stroke-width: 1.5; opacity: 0.54; }
      .control-zone { fill: #132c42; stroke: #5cb9ff; stroke-width: 1.5; opacity: 0.50; }
      .ring-zone { fill: #3a2119; stroke: #ff784f; stroke-width: 1.5; opacity: 0.52; }
      .power { fill: none; stroke: #ffd166; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .ground { fill: none; stroke: #9aa7b8; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .logic { fill: none; stroke: #5cb9ff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .ring { fill: none; stroke: #ff784f; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .audio { fill: none; stroke: #58d68d; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .side { fill: none; stroke: #c891ff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #f4f0e8; stroke: #111821; stroke-width: 2; }
      .ring-node { fill: #ff784f; stroke: #111821; stroke-width: 2; }
      .logic-node { fill: #5cb9ff; stroke: #111821; stroke-width: 2; }
      .audio-node { fill: #58d68d; stroke: #111821; stroke-width: 2; }
      .side-node { fill: #c891ff; stroke: #111821; stroke-width: 2; }
      .power-node { fill: #ffd166; stroke: #111821; stroke-width: 2; }
      .legend-text { fill: #d7dee8; font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .terminal-label { fill: #eff4fb; font: 500 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .mono { fill: #e7edf5; font: 500 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.42"/>
  <path d="M0 0H1920V1080H0Z" fill="none" stroke="#2f3b4b" stroke-width="2"/>

  <text x="72" y="76" class="title">WE302 Operator Rev A Interface</text>
  <text x="74" y="112" class="subtitle">Bench-verified signal domains: ring, hook, pulse, receiver audio, carbon mic, and analog sidetone</text>
  <rect x="1500" y="48" width="348" height="44" rx="22" fill="#233246" stroke="#5f7188"/>
  <text x="1674" y="77" text-anchor="middle" class="small">As-built board schematic for demo video</text>

  <rect x="64" y="155" width="430" height="818" rx="22" class="panel" filter="url(#shadow)"/>
  <rect x="555" y="155" width="810" height="818" rx="22" class="panel-soft" filter="url(#shadow)"/>
  <rect x="1426" y="155" width="430" height="818" rx="22" class="panel" filter="url(#shadow)"/>

  <text x="98" y="204" class="section">Raspberry Pi + ATR2x</text>
  <text x="595" y="204" class="section">Rev A Interface Board</text>
  <text x="1460" y="204" class="section">Western Electric 302</text>

  <rect x="102" y="236" width="352" height="282" rx="16" class="chip"/>
  <text x="126" y="276" class="label">Raspberry Pi 5</text>
  <text x="126" y="306" class="small">GPIO and board power</text>

  <rect x="126" y="335" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="359" class="terminal-label">5V pin 2/4</text>
  <circle cx="410" cy="353" r="7" class="power-node"/>

  <rect x="126" y="382" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="406" class="terminal-label">GND pin 6</text>
  <circle cx="410" cy="400" r="7" class="node"/>

  <rect x="126" y="429" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="453" class="terminal-label">GPIO17 hook</text>
  <circle cx="410" cy="447" r="7" class="logic-node"/>

  <rect x="126" y="476" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="500" class="terminal-label">GPIO10 pulse</text>
  <circle cx="410" cy="494" r="7" class="logic-node"/>

  <rect x="126" y="523" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="547" class="terminal-label">GPIO23 ring</text>
  <circle cx="410" cy="541" r="7" class="logic-node"/>

  <rect x="102" y="615" width="352" height="242" rx="16" class="chip"/>
  <text x="126" y="655" class="label">ATR2x USB Audio</text>
  <text x="126" y="685" class="small">Playback and capture</text>

  <rect x="126" y="718" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="742" class="terminal-label">headphone tip</text>
  <circle cx="410" cy="736" r="7" class="audio-node"/>

  <rect x="126" y="765" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="789" class="terminal-label">headphone sleeve</text>
  <circle cx="410" cy="783" r="7" class="node"/>

  <rect x="126" y="812" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="836" class="terminal-label">mic tip</text>
  <circle cx="410" cy="830" r="7" class="audio-node"/>

  <rect x="126" y="859" width="304" height="36" rx="10" class="term"/>
  <text x="146" y="883" class="terminal-label">mic sleeve</text>
  <circle cx="410" cy="877" r="7" class="node"/>

  <rect x="587" y="232" width="746" height="280" rx="18" class="ring-zone"/>
  <text x="615" y="272" class="label">Ring generation</text>
  <text x="615" y="300" class="small">Relay switches Black Magic low-voltage input; HV output stays isolated.</text>

  <rect x="587" y="538" width="746" height="125" rx="18" class="control-zone"/>
  <rect x="587" y="690" width="746" height="237" rx="18" class="audio-zone"/>

  <path class="power" d="M410 353H596V250H1290"/>
  <path class="ground" d="M410 400H572V944H1290"/>
  <text x="1220" y="245" class="tiny">+5V rail</text>
  <text x="1218" y="941" class="tiny">GND rail</text>

  <rect x="652" y="346" width="138" height="58" rx="12" class="part"/>
  <text x="721" y="372" text-anchor="middle" class="mono">R_BASE</text>
  <text x="721" y="396" text-anchor="middle" class="small">1k</text>

  <rect x="826" y="324" width="132" height="96" rx="14" class="part"/>
  <text x="892" y="354" text-anchor="middle" class="mono">Q1</text>
  <text x="892" y="382" text-anchor="middle" class="small">NPN low-side</text>
  <text x="892" y="406" text-anchor="middle" class="small">relay driver</text>

  <rect x="996" y="306" width="150" height="76" rx="14" class="part"/>
  <text x="1071" y="336" text-anchor="middle" class="mono">K1 coil</text>
  <text x="1071" y="362" text-anchor="middle" class="small">flyback diode</text>

  <rect x="996" y="410" width="150" height="58" rx="14" class="part"/>
  <text x="1071" y="436" text-anchor="middle" class="mono">Relay NO</text>
  <text x="1071" y="460" text-anchor="middle" class="small">switches +5V</text>

  <rect x="1182" y="330" width="122" height="118" rx="16" class="part"/>
  <text x="1243" y="365" text-anchor="middle" class="mono">Black</text>
  <text x="1243" y="390" text-anchor="middle" class="mono">Magic</text>
  <text x="1243" y="420" text-anchor="middle" class="small">20 Hz ring</text>

  <path class="logic" d="M410 541H652"/>
  <path class="logic" d="M790 375H826"/>
  <path class="ground" d="M892 420V944"/>
  <path class="power" d="M1071 306V250"/>
  <path class="power" d="M1146 439H1182"/>
  <path class="power" d="M1071 382V410"/>
  <path class="ground" d="M958 372H996"/>
  <path class="ground" d="M1243 448H1314V944"/>
  <circle cx="572" cy="944" r="7" class="node"/>

  <rect x="652" y="555" width="138" height="50" rx="12" class="part"/>
  <text x="721" y="576" text-anchor="middle" class="mono">R_HOOK</text>
  <text x="721" y="598" text-anchor="middle" class="small">1k</text>
  <rect x="652" y="618" width="138" height="50" rx="12" class="part"/>
  <text x="721" y="639" text-anchor="middle" class="mono">R_PULSE</text>
  <text x="721" y="661" text-anchor="middle" class="small">1k</text>

  <path class="logic" d="M410 447H612V580H652"/>
  <path class="logic" d="M790 580H1378"/>
  <path class="logic" d="M410 494H594V643H652"/>
  <path class="logic" d="M790 643H1378"/>
  <path class="ground" d="M1040 944V612H1378"/>

  <rect x="640" y="709" width="132" height="54" rx="12" class="part"/>
  <text x="706" y="733" text-anchor="middle" class="mono">R_HP</text>
  <text x="706" y="755" text-anchor="middle" class="small">220 ohm</text>

  <rect x="655" y="854" width="132" height="54" rx="12" class="part"/>
  <text x="721" y="882" text-anchor="middle" class="mono">C_MIC_REC</text>
  <text x="721" y="904" text-anchor="middle" class="small">gain cap</text>

  <rect x="862" y="854" width="132" height="54" rx="12" class="part"/>
  <text x="928" y="878" text-anchor="middle" class="mono">R_MIC</text>
  <text x="928" y="900" text-anchor="middle" class="small">220 ohm</text>

  <rect x="1024" y="854" width="142" height="54" rx="12" class="part"/>
  <text x="1095" y="878" text-anchor="middle" class="mono">RV_MIC</text>
  <text x="1095" y="900" text-anchor="middle" class="small">10k pot</text>

  <rect x="1120" y="770" width="142" height="54" rx="12" class="part"/>
  <text x="1191" y="794" text-anchor="middle" class="mono">C_SIDE</text>
  <text x="1191" y="816" text-anchor="middle" class="small">470uF</text>

  <rect x="945" y="770" width="142" height="54" rx="12" class="part"/>
  <text x="1016" y="794" text-anchor="middle" class="mono">RV_SIDE</text>
  <text x="1016" y="816" text-anchor="middle" class="small">1k pot</text>

  <rect x="800" y="770" width="112" height="54" rx="12" class="part"/>
  <text x="856" y="794" text-anchor="middle" class="mono">R_SIDE</text>
  <text x="856" y="816" text-anchor="middle" class="small">10 ohm</text>

  <path class="audio" d="M410 736H640"/>
  <path class="audio" d="M772 736H1190V730H1378"/>
  <path class="audio" d="M410 830H610V881H655"/>
  <path class="audio" d="M787 881H1210V850H1378" marker-end="url(#arrow-audio)"/>
  <path class="ground" d="M410 783H570V944"/>
  <path class="ground" d="M410 877H570"/>
  <path class="ground" d="M1020 944V912H1378"/>

  <path class="power" d="M862 881H804V250"/>
  <path class="power" d="M994 881H1024"/>
  <path class="power" d="M1166 881H1210V850"/>
  <path class="side" d="M1210 850V797H1262"/>
  <path class="side" d="M1120 797H1087"/>
  <path class="side" d="M945 797H912"/>
  <path class="side" d="M800 797H780V730H1190" marker-end="url(#arrow-side)"/>

  <circle cx="1190" cy="730" r="8" class="audio-node"/>
  <circle cx="1210" cy="850" r="8" class="audio-node"/>
  <circle cx="780" cy="730" r="8" class="side-node"/>

  <rect x="1460" y="245" width="352" height="96" rx="16" class="chip"/>
  <text x="1486" y="284" class="label">Mechanical bell</text>
  <text x="1486" y="313" class="small">Black Magic HV directly across L1/K</text>

  <rect x="1460" y="408" width="352" height="216" rx="16" class="chip"/>
  <text x="1486" y="447" class="label">Lifted switch island</text>
  <text x="1486" y="476" class="small">Network bypass gives clean logic</text>
  <text x="1486" y="518" class="mono">BK-Y hook</text>
  <text x="1486" y="548" class="small">on-hook HIGH, off-hook LOW</text>
  <text x="1486" y="590" class="mono">BB-Y pulse</text>
  <text x="1486" y="620" class="small">pulse closes to GND</text>

  <rect x="1460" y="690" width="352" height="240" rx="16" class="chip"/>
  <text x="1486" y="729" class="label">Original handset</text>
  <text x="1486" y="758" class="small">Receiver, shared red/R common, carbon mic</text>
  <text x="1486" y="800" class="mono">WHITE_RX receiver</text>
  <text x="1486" y="832" class="mono">RED/R common</text>
  <text x="1486" y="864" class="mono">BLACK_MIC carbon mic</text>

  <rect x="1378" y="252" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="277" text-anchor="middle" class="terminal-label">L1</text>
  <rect x="1378" y="315" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="340" text-anchor="middle" class="terminal-label">K</text>
  <rect x="1378" y="593" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="618" text-anchor="middle" class="terminal-label">Y</text>
  <rect x="1378" y="561" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="586" text-anchor="middle" class="terminal-label">BK</text>
  <rect x="1378" y="624" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="649" text-anchor="middle" class="terminal-label">BB</text>
  <rect x="1378" y="711" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="736" text-anchor="middle" class="terminal-label">W</text>
  <rect x="1378" y="831" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="856" text-anchor="middle" class="terminal-label">MIC</text>
  <rect x="1378" y="893" width="70" height="38" rx="9" class="term"/>
  <text x="1413" y="918" text-anchor="middle" class="terminal-label">R</text>

  <path class="ring" d="M1304 365H1342V271H1378"/>
  <path class="ring" d="M1304 420H1342V334H1378"/>
  <text x="1318" y="306" class="tiny" fill="#ffb09a">isolated HV</text>

  <path class="logic" d="M1378 580H1344"/>
  <path class="logic" d="M1378 643H1344"/>
  <path class="ground" d="M1378 612H1344"/>
  <path class="audio" d="M1378 730H1344"/>
  <path class="ground" d="M1378 912H1344"/>
  <path class="audio" d="M1378 850H1344"/>

  <rect x="80" y="1000" width="1760" height="48" rx="24" fill="#172231" stroke="#354255"/>
  <circle cx="118" cy="1024" r="7" class="power-node"/><text x="137" y="1030" class="legend-text">+5V</text>
  <circle cx="223" cy="1024" r="7" class="node"/><text x="242" y="1030" class="legend-text">ground/common</text>
  <circle cx="405" cy="1024" r="7" class="logic-node"/><text x="424" y="1030" class="legend-text">GPIO logic</text>
  <circle cx="558" cy="1024" r="7" class="ring-node"/><text x="577" y="1030" class="legend-text">ring HV</text>
  <circle cx="704" cy="1024" r="7" class="audio-node"/><text x="723" y="1030" class="legend-text">audio</text>
  <circle cx="820" cy="1024" r="7" class="side-node"/><text x="839" y="1030" class="legend-text">sidetone</text>
  <text x="1260" y="1030" class="legend-text">Ring cutoff is software: off-hook immediately drops GPIO23.</text>

</svg>
